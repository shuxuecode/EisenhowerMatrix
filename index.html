<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四象限工作法 - 艾森豪威尔矩阵</title>
    <link rel="icon" type="image/png" href="image/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="matrix-container" id="matrixContainer"></div>

    <div class="stats-bar" id="statsBar"></div>

    <button class="trash-btn" id="trashBtn">🗑️<span class="trash-count" id="trashCount"></span></button>
    <div class="trash-overlay" id="trashOverlay"></div>
    <div class="trash-panel" id="trashPanel">
        <div class="trash-header">
            <div class="trash-title">🗑️ 回收站</div>
            <button class="clear-btn" id="btnClearTrash" style="padding:6px 14px;font-size:0.8rem">清空回收站</button>
        </div>
        <ul class="trash-list" id="trashList"></ul>
    </div>

    <div class="loading-bar" id="loadingBar"></div>

    <button class="settings-btn" id="settingsBtn" title="GitHub 设置">⚙️</button>
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <h3>GitHub 连接设置 <span id="connStatus" class="conn-status"></span></h3>
        <label>Personal Access Token</label>
        <input type="password" id="configToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
        <label>仓库 (owner/repo)</label>
        <input type="text" id="configRepo" placeholder="myusername/my-repo" />
        <label>分支</label>
        <input type="text" id="configBranch" value="main" placeholder="main" />
        <div class="settings-buttons">
            <button class="btn-connect" id="btnConnect">连接</button>
            <button class="btn-disconnect" id="btnDisconnect">断开</button>
        </div>
        <div class="status-msg" id="settingsStatus"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
